# === intended_label_profile_12 — 12 반응라벨 의도 프로파일 (Gap cosine용, 2026-06 재투영) ===
# 원본 위 구조 전부 보존. concept_axes 근거로 옛 profile을 12라벨로 재투영.
# zone=concept(8개)만 cosine 대상 / reaction_only(신규·장기·역주행)는 자생반응이라 제외.
# 보정: 음악성 4중계상 방지(연주·보컬 med), negane 밴드 med. level→score: high=1.0 med=0.6 low=0.3 none=0
intended_label_profile_12:
  밴드_정체성:
    level: med
    zone: concept
    basis: concept_axes:youth_band_identity (+ core_intent '청춘과 기억을 이야기하는 밴드 아이덴티티를 강화')
    evidence: '발매보고서 p7 quote: ''청춘과 기억을 이야기하는 밴드''; core_intent: ''청춘과 기억을 이야기하는 밴드 아이덴티티를 강화한다'''
  연주_악기:
    level: high
    zone: concept
    basis: concept_axes:whistle_pop_rock (감성적 기타 라인·휘파람·기타 리프·밴드 사운드)
    evidence: '기획안 p2 quote: ''감성적인 기타 라인''; axis keywords [휘파람, 휘슬, 기타, 기타 리프, 팝록, 밴드 사운드]'
  보컬_라이브:
    level: med
    zone: concept
    basis: concept_axes:whistle_pop_rock (청량한 보컬과의 조화) — 기타/연주 대비 부차적 비중
    evidence: 'concept_axes whistle_pop_rock description: ''미디엄 템포 팝 록과 청량한 보컬의 조화''; keywords 포함 [보컬, 음색]'
  음악성:
    level: med
    zone: concept
    basis: 옛 음악성=medium + concept_axes:whistle_pop_rock (사운드 완성 요소 전면화)
    evidence: intended_label_profile 음악성 level medium, rationale '기타 라인·휘파람·미디엄 템포 팝 록·보컬 조화 등 사운드 완성 요소를 전면에 내세움' (기획안 p2)
  비주얼_멤버매력:
    level: med
    zone: concept
    basis: concept_axes:seunghyub_hweseung_duo (승협·회승 듀오 케미·투샷 연출)
    evidence: '발매보고서 p7 quote: ''립+이미지 비디오''; axis description ''스페셜클립을 승협·회승 두 멤버 중심으로 연출해 듀오 케미를 부각''; keywords [케미, 투샷, 둘이]'
  이별_감성:
    level: none
    zone: concept
    basis: 옛 감성=high이나 정서가 상실·이별이 아닌 '스며든 사랑·설렘 고백'이라 이별_감성에 대응 없음
    evidence: 'core_intent: ''바람처럼 마음에 스며든 사랑에 대한 경쾌한 고백''; concept_axes:breeze_love_confession description ''기분 좋은 설렘을 전달'' — 상실·이별 정서 근거 없음'
  위로_공감:
    level: low
    zone: concept
    basis: 옛 감성=high에서 파생되나 정서가 설렘·고백 중심이고 위로·치유 의도는 명시 약함
    evidence: '기획안 p2 quote: ''기분 좋은 설렘''; intended_label_profile 감성 rationale ''기분 좋은 설렘 전달이 앨범 소개의 핵심'' — 치유·위로 명시는 없어 low'
  청량_여름:
    level: high
    zone: concept
    basis: concept_axes:summer_sea_refresh (여름·바다 청량 무드, 문서 전반 최강 컨셉)
    evidence: '발매보고서 p7 quote: ''#바람 #파랑 #청량''; intended_label_profile 청량 level high rationale ''문서 전반에서 가장 강하게 의도된 컨셉'''
  신규_유입:
    level: none
    zone: reaction_only
    basis: 옛 입덕=none — 유일 근거(발매보고서 p11)가 사후 성과 페이지로 검증에서 누수 제외됨
    evidence: intended_label_profile 입덕 level none rationale '제휴 바이럴 근거(p11)가 발매 후 성과 집계 페이지라 제외'; extraction_audit excluded_reaction_pages 발매보고서 [11,12,15,16]
  장기_팬덤:
    level: med
    zone: reaction_only
    basis: 옛 응원=low(팬사인회·영통) + concept_axes:airdrop_mystery_teaser(추측 유도) + concert_preview_song(공연-음원 연결) 등 팬덤 결속 설계
    evidence: '기획안 p5 quote: ''발매 직전 팬덤 관심 붐업''; 발매보고서 p14 quote ''1:1 개인 영통 멤버별 10명씩 / 대면 50명''; target_outcomes ''발매 직전 팬덤 관심 붐업'''
  역주행_기대:
    level: none
    zone: reaction_only
    basis: 옛 역주행=none — 문서 내 근거 없음
    evidence: intended_label_profile 역주행 level none rationale '문서 내 근거 없음'
