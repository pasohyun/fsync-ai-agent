# 기획 의도 — FLY HIGH PROJECT #2 '옥탑방' (2019)
# 합성 출처: _extract_oktapbang_kihoek.json + _extract_oktapbang_report.json (검증 통과 항목만)
# 누수 방지: 발매보고서 p13~30(사후 섹션) 및 사후 인용 기반 항목 제외
release: oktapbang
album_title: "FLY HIGH PROJECT #2 '옥탑방'"
release_date: "2019-01-02"
source_docs:
  - "[NF] FLY HIGH #2_프로모션 기획안(사전,사후)_181219.pdf"
  - "[NF]FH 2ND 싱글_옥탑방_발매보고서_190515.pdf (p3~12 기획 섹션만)"

core_intent: >
  기존 '아이돌 밴드' 이미지를 최소화하고 자작곡 타이틀을 어필해 '아티스트'로
  포지셔닝을 전환한다. '옥탑방'이라는 아지트 같은 공간을 N.Flying만의 정체성으로
  구축하고, 러프하고 자유분방한 인디밴드 무드와 라이브 실연 콘텐츠,
  규칙 게임형 유쾌 콘텐츠로 음악성과 재미를 동시에 전달한다.

concept_axes:
  - axis_id: rooftop_hideout
    name: 옥탑방 아지트 공간
    description: 곡 제목이자 컨셉의 중심인 '옥탑방'을 N.Flying만의 정체성이 담긴 아지트 공간으로 구축. 컨셉포토·라이브·리릭비디오를 모두 옥탑/루프탑 배경으로 연출.
    evidence: {doc: 발매보고서, page: 4, quote: "마이웨이의 러프한 감성을 강조한 네이밍"}
    keywords: [옥탑방, 루프탑, 옥상, 아지트, 자취방, 골목, 평상, 야경, 도시, 우리만의 공간]
    asset_scope: [album, concept_photo, MV, live, promotion]
  - axis_id: artist_self_made
    name: 자작곡·아티스트 포지셔닝
    description: 아이돌 밴드 이미지를 최소화하고 자작곡 타이틀을 어필해 아티스트 이미지로 전환.
    evidence: {doc: 발매보고서, page: 3, quote: "자작곡 타이틀을 어필하여 '아티스트' 이미지로 포지셔닝"}
    keywords: [자작곡, 작곡, 작사, 아티스트, 이승협, 직접 만든, 실력파, 프로듀싱]
    asset_scope: [album, sound, promotion]
  - axis_id: free_indie_vibe
    name: 러프·자유분방 인디 무드
    description: 회사 기획으로 꾸며진 아이돌이 아닌 자유분방하고 자연스러운 인디밴드 같은 이미지. 빈티지하고 힙한 스타일링.
    evidence: {doc: 기획안, page: 3, quote: "러프하고 자유로운 엔플라잉의 캐릭터를 보여주는 컨셉포토"}
    keywords: [자유분방, 러프, 인디, 꾸안꾸, 힙하다, 빈티지, 레트로, 캐주얼, 자연스럽, 마이웨이]
    asset_scope: [concept_photo, teaser, promotion]
  - axis_id: live_band_performance
    name: 라이브 밴드 실연·보컬
    description: 루프탑 라이브(VLIVE), 노래·연주 리릭비디오, 유회승 보컬 커버 채널 등 실연 중심 콘텐츠로 라이브 실력을 어필.
    evidence: {doc: 기획안, page: 4, quote: "VLIVE '루프탑 라이브' – 옥탑방 라이브"}
    keywords: [라이브, 연주, 밴드, 기타, 드럼, 베이스, 보컬, 음색, 유회승, 회승, 라이브 맛집, 커버]
    asset_scope: [live, MV, sound, promotion]
  - axis_id: lyrics_projection
    name: 가사 전면 배치 연출
    description: "옥탑방 내부 흰 벽에 프로젝터로 가사를 투사하고 그 앞에서 노래·연주하는 리릭비디오 — 가사를 시각의 중심에 두는 연출 장치. (주의 — 검증 반영: '가사 공감 의도'라는 명시 서술은 문서에 없음, 연출 장치로만 기술)"
    evidence: {doc: 기획안, page: 5, quote: "옥탑방 내부 흰 벽에 프로젝터로 가사를 띄우고"}
    keywords: [가사, 노랫말, 가사 맛집, 띵곡, 여운, 위로, 리릭비디오, 프로젝터]
    asset_scope: [lyrics, MV, sound]
  - axis_id: witty_humor_content
    name: 규칙 게임형 유쾌 콘텐츠
    description: 멤버당 10초 제한·내용 중복 금지 인터뷰, 취존 그리팅 등 게임 규칙형 예능 콘텐츠로 재미·유쾌함을 설계.
    evidence: {doc: 기획안, page: 2, quote: "새로운 정보와 소개를 제공해야 하는 규칙을 부여하여 재미요소 가미"}
    keywords: [웃기다, 유쾌, 드립, 예능, 꿀잼, 짤, 텐션, 입담, 케미, 개그]
    asset_scope: [promotion, teaser]
  - axis_id: fan_intimacy
    name: 팬 소통·친밀감
    description: 팬사인회 부재를 취존 그리팅 팬 이벤트와 멤버 개인 SNS 활용으로 상쇄해 팬과의 소통·친밀감 유지.
    evidence: {doc: 기획안, page: 5, quote: "팬사인회 부재로 생기는 소통과 친밀감의 한계를 상쇄시키고, 유쾌한 모습을 유도"}
    keywords: [소통, 팬서비스, 다정, 팬바보, 브이라이브, 인스타, 취존, 팬미팅]
    asset_scope: [promotion, live]
  - axis_id: sunset_window_visual
    name: 노을·창문 비주얼 모티프
    description: 빌딩 도시 속 옥상 아지트에서 노을을 기다리는 자유로운 일상(이상향)을 그리는 MV, 컨셉포토·커버 전반의 '창문' 모티프.
    evidence: {doc: 발매보고서, page: 10, quote: "노을을 기다리며 시간을 보내는 멤버들의 자유로운 일상"}
    keywords: [노을, 해질녘, 창문, 창밖, 하늘, 이상향, 힐링, 일상, 소소한 행복]
    asset_scope: [MV, concept_photo, album]

intended_label_profile:
  음악성: {level: high, rationale: "자작곡 어필로 아티스트 포지셔닝 전환 + 라이브·리릭비디오 실연 콘텐츠 집중", evidence: {doc: 발매보고서, page: 3, quote: "자작곡 타이틀을 어필하여 '아티스트' 이미지로 포지셔닝"}}
  유머: {level: high, rationale: "10초 인터뷰 규칙 부여로 재미요소를 명시적으로 설계, 유쾌한 모습 바이럴 유도", evidence: {doc: 기획안, page: 2, quote: "규칙을 부여하여 재미요소 가미"}}
  감성: {level: medium, rationale: "'러프한 감성' 네이밍, 노을·아지트 무드, 가사 투사 연출 — 정서적 분위기를 컨셉 중심에 둠", evidence: {doc: 발매보고서, page: 4, quote: "마이웨이의 러프한 감성을 강조한 네이밍"}}
  응원: {level: medium, rationale: "취존 그리팅 등 팬 소통·친밀감 이벤트 설계 (검증 반영: 직접적 '응원 반응' 명시는 없어 medium)", evidence: {doc: 기획안, page: 5, quote: "소통과 친밀감의 한계를 상쇄시키고"}}
  입덕: {level: low, rationale: "유쾌 콘텐츠 바이럴 진행 의도 — 신규 유입을 간접 겨냥 (발매보고서 광고 집행 근거는 사후 페이지라 제외)", evidence: {doc: 기획안, page: 5, quote: "이를 컨텐츠로 촬영하여 바이럴을 진행"}}
  청량: {level: none, rationale: "검증 결과 문서 내 근거 없음 — '러프·자유분방'이 의도였고 청량은 사후 댓글 어휘", evidence: null}
  섹시: {level: none, rationale: "문서 내 근거 없음", evidence: null}
  귀여움: {level: none, rationale: "문서 내 근거 없음", evidence: null}
  역주행: {level: none, rationale: "2019 기획 시점에 역주행 의도 부재 (역주행은 2020년 사후 현상)", evidence: null}
  재방문: {level: none, rationale: "문서 내 반복 소비 유도 설계 없음", evidence: null}
  부정: {level: none, rationale: "의도된 반응 아님", evidence: null}
  기타: {level: none, rationale: "분석 외 라벨", evidence: null}

visual_direction:
  mood: [러프·자유분방 인디, 옥탑방 청춘 일상, 유쾌한 예능 톤, 빈티지·힙]
  colors: [밤하늘 네이비, 화이트(창문 프레임), 비비드 원색 배경 판넬(핑크·오렌지·옐로), 무채색 도시 톤]
  props: [옥탑방 배경 판넬, 프로젝터와 흰 벽, 컨테이너·철제 계단, 도시 스카이라인, 악기]

target_outcomes:
  - 아이돌 밴드 → 자작곡 기반 아티스트 이미지 전환
  - "'옥탑방=N.Flying 아지트' 정체성 공간 구축"
  - 단계적 스포일러 티징(의상→10초 인터뷰→컨셉포토)으로 컴백 기대감 조성
  - 팬사인회 부재 한계를 팬 이벤트로 상쇄, 유쾌한 모습 바이럴 확산

risk_notes:
  - 팬사인회 부재로 인한 소통·친밀감 한계를 사전 인지하고 보완책 설계 (기획안 p5)

